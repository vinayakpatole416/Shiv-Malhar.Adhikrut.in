<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>ई-डिजिटल स्मार्ट कार्ड | श्री शिवमल्हार</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #fdf5e6; padding: 20px; text-align: center; }
        .form-box { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        input { width: 90%; padding: 10px; margin: 5px 0; }
        .card { width: 350px; padding: 20px; border: 4px solid #8e44ad; border-radius: 15px; margin: 20px auto; background: white; text-align: left; }
    </style>
</head>
<body>

    <div class="form-box">
        <h2>स्मार्ट कार्ड माहिती</h2>
        <input type="text" id="name" placeholder="पूर्ण नाव">
        <input type="date" id="dob" onchange="calculateAge()">
        <p>वय: <span id="ageDisplay">-</span></p>
        <input type="text" id="lokSabha" placeholder="लोकसभा मतदारसंघ">
        <input type="text" id="vidhanSabha" placeholder="विधानसभा मतदारसंघ">
        <input type="file" id="photoInput" accept="image/*">
        <button onclick="generateCard()" style="padding: 10px; background: #8e44ad; color: white;">कार्ड तयार करा</button>
    </div>

    <div id="cardArea"></div>
    <button id="pdfBtn" style="display:none; padding:10px; background:#27ae60; color:white;" onclick="downloadPDF()">PDF डाउनलोड करा</button>

    <script>
        // १. वय मोजणे
        function calculateAge() {
            const dob = new Date(document.getElementById('dob').value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            document.getElementById('ageDisplay').innerText = age;
        }

        // २. कार्ड जनरेशन
        function generateCard() {
            const name = document.getElementById('name').value;
            const age = document.getElementById('ageDisplay').innerText;
            const ls = document.getElementById('lokSabha').value;
            const vs = document.getElementById('vidhanSabha').value;
            const candNo = "SMS-" + Math.floor(1000 + Math.random() * 9000); // ऑटो उमेदवार क्र.

            const photo = document.getElementById('photoInput').files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                document.getElementById('cardArea').innerHTML = `
                    <div class="card" id="cardContent">
                        <h3>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h3>
                        <img src="${e.target.result}" style="width:80px;">
                        <p><strong>नाव:</strong> ${name}</p>
                        <p><strong>वय:</strong> ${age}</p>
                        <p><strong>लोकसभा:</strong> ${ls}</p>
                        <p><strong>विधानसभा:</strong> ${vs}</p>
                        <p><strong>उमेदवार क्र.:</strong> ${candNo}</p>
                        <p>स्थापक: मा. श्री. विनायक पाटोळे</p>
                    </div>
                `;
                document.getElementById('pdfBtn').style.display = "inline-block";
            }
            if(photo) reader.readAsDataURL(photo);
        }

        // ३. पीडीएफ डाउनलोड
        function downloadPDF() {
            const element = document.getElementById('cardContent');
            html2pdf().from(element).save('Smart_Card.pdf');
        }
    </script>
</body>
</html>
