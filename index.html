<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        
        /* लोगो पूर्ण स्क्रीन रुंदीसाठी */
        .logo-container { width: 100%; height: auto; display: flex; justify-content: center; background: #ffffff; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo-container img { width: 100%; max-width: 600px; height: auto; object-fit: contain; }

        .header { margin: 20px 0; text-align: center; color: #2c3e50; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 95%; max-width: 800px; margin-bottom: 30px; }
        
        .card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #ddd; transition: 0.3s; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card:hover { transform: scale(1.05); background: #ff9800; color: white; }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="श्री शिवमल्हार स्वराज्य प्रतिष्ठान.jpg" alt="श्री शिवमल्हार स्वराज्य प्रतिष्ठान">
    </div>

    <div class="header">
        <h1>⛳ अधिकृत नियंत्रण केंद्र 🕉️</h1>
    </div>

    <div class="dashboard-grid">
        <div class="card">👑<br>स्थापक</div>
        <div class="card">🏛️<br>ट्रस्ट</div>
        <div class="card">🏢<br>संस्था</div>
        <div class="card">🤝<br>सार्वजनिक मित्र मंडळ</div>
        <div class="card">🗳️<br>राजकीय पॅनल</div>
    </div>

</body>
</html>
