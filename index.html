<!DOCTYPE html>
<html lang="mr">
<head>
<style>
  body {
    background: #0f0f0f; /* गडद काळी थीम */
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* लोगो - फुल स्क्रीन ॲटीट्युड */
  .logo-box {
    width: 280px;
    height: 280px;
    margin-top: 40px;
    border: 3px solid #ff9933;
    box-shadow: 0 0 40px rgba(255, 153, 51, 0.5);
    background-image: url('39352.jpg');
    background-size: cover;
    border-radius: 20px; /* आयात आकार */
    transition: 0.5s;
  }
  .logo-box:hover { transform: scale(1.05); }

  /* बटण - तोड डिझाइन */
  .grid-container {
    display: grid;
    grid-template-columns: 1fr 1fr; /* दोन कॉलम */
    gap: 15px;
    width: 100%;
    margin-top: 40px;
  }

  .btn {
    background: linear-gradient(145deg, #222, #000);
    border: 1px solid #ff9933;
    color: white;
    padding: 20px;
    text-align: center;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 5px 5px 15px #000;
  }
  .btn:hover {
    background: #ff9933;
    color: black;
    border: 1px solid white;
  }
  .full-width { grid-column: span 2; }
</style>
</head>
<body>

  <div class="logo-box"></div>

  <div class="grid-container">
    <div class="btn">१. संस्थापक</div>
    <div class="btn">२. ट्रस्ट</div>
    <div class="btn">३. संस्था</div>
    <div class="btn">४. मित्र मंडळ</div>
    <div class="btn full-width">५. राजकीय पॅनल (विशेष)</div>
  </div>

</body>
</html>
