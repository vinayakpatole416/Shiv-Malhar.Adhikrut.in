<!DOCTYPE html>
<html lang="mr">
<head>
    <style>
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            font-family: 'Poppins', sans-serif; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; color: white;
        }
        .logo-box { width: 100%; max-width: 400px; margin-bottom: 30px; border: 2px solid gold; border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px gold; }
        .logo-box img { width: 100%; display: block; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 600px; }
        
        .btn-card { 
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 25px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.4s; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-card:hover { 
            background: gold; color: black; transform: scale(1.08); box-shadow: 0 0 30px gold;
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="श्री शिवमल्हार स्वराज्य प्रतिष्ठान.jpt" alt="Logo">
    </div>

    <div class="grid">
        <div class="btn-card">👑<br>स्थापक</div>
        <div class="btn-card">🏛️<br>ट्रस्ट</div>
        <div class="btn-card">🏢<br>संस्था</div>
        <div class="btn-card">🤝<br>सार्वजनिक मित्र मंडळ</div>
        <div class="btn-card" style="grid-column: span 2;">🗳️<br>राजकीय पॅनल</div>
    </div>

</body>
</html>
