<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans Devanagari', sans-serif; /* मराठी फॉन्टसाठी उत्तम */
        }

        body {
            background-color: #f4f4f4; /* हलकी ग्रे पार्श्वभूमी */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile App Frame */
        .app-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            min-height: 100vh;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 1. NEW THEME: Logo Header (Royal Saffron Theme) */
        .logo-section {
            width: 100%;
            padding: 30px 20px;
            background: linear-gradient(180deg, #ff9900 0%, #e68a00 100%); /* भगवा ग्रेडियंट */
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }

        .rectangular-logo-img {
            width: 90%; /* लोगोची रुंदी */
            max-height: 150px; /* लोगोची जास्तीत जास्त उंची */
            object-fit: contain; /* लोगोचा आकार राखण्यासाठी */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        /* Menu Section - New Style */
        .menu-section {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/diagmonds-light.png'); /* हलका पॅटर्न */
        }

        .app-btn {
            background: #ffffff;
            color: #333333;
            border: none;
            padding: 20px 25px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700; /* ठळक अक्षरे */
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            text-decoration: none;
            border: 1px solid #e0e0e0;
        }

        /* Button Hover Effect */
        .app-btn:hover {
            background: #fff3e0; /* माऊस नेल्यावर हलका पिवळा रंग */
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 153, 0, 0.2);
            border-color: #ff9900;
        }

        /* Icons on Buttons (Using Emojis for simplicity) */
        .btn-icon {
            font-size: 28px;
        }

        /* Footer - Updated */
        .app-footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #777777;
            background-color: #f9f9f9;
            border-top: 1px solid #eee;
            font-weight: 500;
        }

        /* Responsive Font Loading */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap');
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="logo-section">
            <img src="श्री शिवमल्हार स्वराज्य प्रतिष्ठान.jpg" alt="श्री शिवमल्हार स्वराज्य प्रतिष्ठान लोगो" class="rectangular-logo-img">
        </div>

        <div class="menu-section">
            
            <a href="#trust" class="app-btn">
                <span class="btn-icon">🏛️</span>
                <span>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - ट्रस्ट</span>
            </a>

            <a href="#sanstha" class="app-btn">
                <span class="btn-icon">🏢</span>
                <span>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - संस्था</span>
            </a>

            <a href="#mitra-mandal" class="app-btn">
                <span class="btn-icon">🛕</span>
                <span>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - सार्वजनिक मित्र मंडळ</span>
            </a>

            <a href="#founder" class="app-btn">
                <span class="btn-icon">🔶</span>
                <span>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - स्थापक/अध्यक्ष</span>
            </a>

            <a href="#politics" class="app-btn">
                <span class="btn-icon">🇮🇳</span>
                <span>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - राजकीय पॅनल</span>
            </a>
            
        </div>

        <div class="app-footer">
            समर्पित समाजकार्य | महाराष्ट्र राज्य
        </div>

    </div>

</body>
</html>
