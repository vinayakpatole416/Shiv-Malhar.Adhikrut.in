<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fdf5e6; margin: 0; padding-bottom: 20px; }
        .header { background-color: orange; padding: 20px; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .logo { width: 180px; height: 100px; object-fit: contain; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
        
        /* बटणांचे नूतनीकरण */
        .btn-container { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        .btn { display: block; width: 85%; margin: 10px auto; padding: 18px; background: white; border-radius: 15px; text-decoration: none; color: #333; font-weight: bold; border: 2px solid orange; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:hover { background: orange; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <img src="InShot_20260620_172115382.jpg" class="logo" alt="Logo">
        <h1>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h1>
    </div>

    <div style="margin: 15px; font-size: 0.9rem;">भाषा: मराठी | संस्कृत | English</div>

    <div class="btn-container">
        <a href="trust.html" class="btn">विश्वास (Trust)</a>
        <a href="society.html" class="btn">संस्था (Society)</a>
        <a href="gramseva.html" class="btn">ग्रामसेवा (Gramseva)</a>
        <!-- हे बटण आता तुमच्या siddhivinayak.html ला लिंक होईल -->
        <a href="siddhivinayak.html" class="btn">सिद्धिविनायक (Siddhivinayak)</a>
        <a href="candidate.html" class="btn">उमेदवार (Candidate)</a>
        <a href="admin.html" class="btn">प्रशासक (Admin)</a>
    </div>

    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log('Service Worker registered!'))
        .catch(err => console.log('Service Worker registration failed:', err));
      }
    </script>
</body>
</html>
