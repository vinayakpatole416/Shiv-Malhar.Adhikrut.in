<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; margin: 0; padding: 0; }
        .header { background-color: #ff6600; color: white; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .btn { width: 90%; max-width: 400px; padding: 20px; margin: 10px 0; background: white; border: none; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .dot { height: 20px; width: 20px; border-radius: 50%; margin-right: 15px; }
    </style>
</head>
<body>

<div class="header">
    श्री शिवमल्हार स्वराज्य प्रतिष्ठान 🚩
</div>

<div class="container">
    <button class="btn"><span class="dot" style="background-color: orange;"></span> Trust</button>
    <button class="btn"><span class="dot" style="background-color: blue;"></span> Society</button>
    <button class="btn"><span class="dot" style="background-color: green;"></span> Gramseva</button>
    <button class="btn"><span class="dot" style="background-color: gold;"></span> Siddhivinayak</button>
    <button class="btn"><span class="dot" style="background-color: red;"></span> Candidate</button>
    <button class="btn"><span class="dot" style="background-color: black;"></span> Admin</button>
</div>

</body>
</html>
