<!DOCTYPE html>
<html lang="mr">
<head>
<style>
  body {
    background: linear-gradient(180deg, #FF6600 0%, #FFD700 100%);
    font-family: 'Arial', sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px;
  }
  
  /* मोठा लोगो आकार */
  .logo-container {
    margin-top: 50px;
    margin-bottom: 40px;
  }
  .logo-container img {
    width: 250px;
    height: 250px;
    border-radius: 20px; /* आयात/चौरस आकार */
    border: 6px solid #FFF;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
  }

  /* बटण डिझाइन */
  .btn {
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid #FFD700;
    padding: 18px;
    margin: 10px;
    width: 90%;
    color: #FFD700;
    font-weight: bold;
    font-size: 18px;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: 0.4s;
    text-transform: uppercase;
  }
  .btn:hover {
    background: #FFD700;
    color: black;
    box-shadow: 0 0 15px #FFF;
  }
</style>
</head>
<body>

  <div class="logo-container">
    <img src="श्री शिवमल्हार स्वराज्य प्रतिष्ठान.jpg" alt="शिवमल्हार लोगो">
  </div>

  <div class="btn">१.श्री शिवमल्हार स्वराज्य प्रतिष्ठान - संस्थापक (Founder)</div>
  <div class="btn">२.श्री शिवमल्हार स्वराज्य प्रतिष्ठान - ट्रस्ट (Trust)</div>
  <div class="btn">३.श्री शिवमल्हार स्वराज्य प्रतिष्ठान - संस्था (Society)</div>
  <div class="btn">४.श्री शिवमल्हार स्वराज्य प्रतिष्ठान - सार्वजनिक मित्र मंडळ</div>
  <div class="btn">५.श्री शिवमल्हार स्वराज्य प्रतिष्ठान - राजकीय पॅनल (Political Panel)</div>

</body>
</html>
