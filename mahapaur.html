<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - महानगरपालिका स्तर</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf5e6; padding: 15px; }
        .header { background: #d35400; color: white; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px;}
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; margin-bottom: 20px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        .mnp-title { text-align: center; color: #d35400; margin-top: 10px; padding-bottom: 10px; border-bottom: 2px solid #d35400; }
        .wing-title { font-weight: bold; color: white; background: #d35400; padding: 10px; margin-top: 20px; border-radius: 5px; }
        .post { margin: 4px 0; padding: 8px; border-bottom: 1px dotted #ccc; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="header"><h1>🏢 श्री शिवमल्हार स्वराज्य प्रतिष्ठान (महानगरपालिका)</h1></div>

<div class="container">
    <label><b>महानगरपालिका निवडा:</b></label>
    <select id="mnpSelect" onchange="showData()">
        <option value="">-- महानगरपालिका निवडा --</option>
    </select>

    <div id="output"></div>
</div>

<script>
    const mnpList = [
        "मुंबई", "पुणे", "नागपूर", "ठाणे", "पिंपरी-चिंचवड", "नाशिक", "छत्रपती संभाजीनगर", 
        "कल्याण-डोंबिवली", "वसई-विरार", "नवी मुंबई", "सोलापूर", "मीरा-भाईंदर", "भिवंडी-निजामपूर", 
        "अमरावती", "नांदेड-वाघाळा", "कोल्हापूर", "अकोला", "जळगाव", "अहिल्यानगर", "धुळे", 
        "लातूर", "परभणी", "चंद्रपूर", "मालेगाव", "उल्हासनगर", "पनवेल", "चंद्रपूर", "इचलकरंजी", "जालना"
    ];

    const wings = [
        "श्री शिवमल्हार स्वराज्य प्रतिष्ठान - main", "श्री शिवमल्हार विध्यार्थी स्वराज्य प्रतिष्ठान", 
        "श्री शिवमल्हार कन्या स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार महिला स्वराज्य प्रतिष्ठान", 
        "श्री शिवमल्हार शेतकरी स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार कामगार स्वराज्य प्रतिष्ठान", 
        "श्री शिवमल्हार आरोग्य स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार परिवहन स्वराज्य प्रतिष्ठान", 
        "श्री शिवमल्हार उद्योजक स्वराज्य प्रतिष्ठान", "श्री शिवमल्हार क्रीडा स्वराज्य प्रतिष्ठान"
    ];

    const posts = ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"];

    const mnpSelect = document.getElementById('mnpSelect');
    mnpList.forEach(mnp => mnpSelect.innerHTML += `<option value="${mnp}">${mnp} महानगरपालिका</option>`);

    function showData() {
        let selectedMnp = mnpSelect.value;
        let out = document.getElementById('output');
        
        if(!selectedMnp) { out.innerHTML = ''; return; }

        let html = `<h2 class="mnp-title">📍 ${selectedMnp} महानगरपालिका - पदाधिकारी</h2>`;
        
        wings.forEach(w => {
            html += `<div class="wing-title">${w}</div>`;
            posts.forEach(p => html += `<div class="post"><span>${p}</span> <span>[नाव]</span></div>`);
        });
        
        out.innerHTML = html;
    }
</script>

</body>
</html>
