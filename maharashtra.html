<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>महाराष्ट्र स्तर - संघटनात्मक डॅशबोर्ड</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; padding: 15px; }
        .header { background: orange; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        
        /* मुख्य प्रतिष्ठान */
        .main-org { background: #fff3cd; border: 2px solid orange; padding: 15px; border-radius: 15px; margin-bottom: 25px; }
        .main-org h2 { color: #d35400; text-align: center; margin-top: 0; }
        
        .accordion { background: white; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
        .accordion-header { padding: 12px; background: #fff8ee; cursor: pointer; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .accordion-content { padding: 10px; display: none; font-size: 0.9rem; }
        .post { margin: 4px 0; padding: 4px; border-bottom: 1px dotted #ccc; }
    </style>
</head>
<body>

<div class="header"><h1>महाराष्ट्र स्तर - संघटना</h1></div>

<!-- मुख्य प्रतिष्ठान -->
<div class="main-org">
    <h2>🚩 श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h2>
    <div class="post"><b>१. अध्यक्ष:</b> [नाव]</div>
    <div class="post"><b>२. उपाध्यक्ष:</b> [नाव]</div>
    <div class="post"><b>३. सचिव:</b> [नाव]</div>
    <div class="post"><b>४. उपसचिव:</b> [नाव]</div>
    <div class="post"><b>५. शाखाप्रमुख:</b> [नाव]</div>
    <div class="post"><b>६. शाखाउपप्रमुख:</b> [नाव]</div>
    <div class="post"><b>७. कार्याध्यक्ष:</b> [नाव]</div>
    <div class="post"><b>८. कार्याउपाध्यक्ष:</b> [नाव]</div>
    <div class="post"><b>९. सभासद:</b> [नाव]</div>
    <div class="post"><b>१०. उपसभासद:</b> [नाव]</div>
</div>

<h3>इतर अंतर्गत प्रतिष्ठान:</h3>

<!-- १० प्रतिष्ठानचे ब्लॉक्स -->
<script>
    const orgs = [
        "विद्यार्थी", "कन्या", "महिला", "शेतकरी", "कामगार", 
        "आरोग्य", "परिवहन", "उद्योजक", "क्रीडा"
    ];

    orgs.forEach(name => {
        document.write(`
            <div class="accordion">
                <div class="accordion-header" onclick="toggle(this)">श्री शिवमल्हार ${name} स्वराज्य प्रतिष्ठान <span>▼</span></div>
                <div class="accordion-content">
                    <div class="post">१. अध्यक्ष: [नाव]</div>
                    <div class="post">२. उपाध्यक्ष: [नाव]</div>
                    <div class="post">३. सचिव: [नाव]</div>
                    <div class="post">४. उपसचिव: [नाव]</div>
                    <div class="post">५. शाखाप्रमुख: [नाव]</div>
                    <div class="post">६. शाखाउपप्रमुख: [नाव]</div>
                    <div class="post">७. कार्याध्यक्ष: [नाव]</div>
                    <div class="post">८. कार्याउपाध्यक्ष: [नाव]</div>
                    <div class="post">९. सभासद: [नाव]</div>
                    <div class="post">१०. उपसभासद: [नाव]</div>
                </div>
            </div>
        `);
    });

    function toggle(el) {
        let content = el.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }
</script>

</body>
</html>
