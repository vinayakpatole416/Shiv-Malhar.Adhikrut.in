<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>महाराष्ट्र स्तर - संघटनात्मक डॅशबोर्ड</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; padding: 15px; }
        .header { background: orange; color: white; padding: 15px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .accordion { background: white; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; }
        .accordion-header { padding: 15px; background: #fff8ee; cursor: pointer; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .accordion-content { padding: 15px; display: none; font-size: 0.95rem; }
        .post { margin: 5px 0; padding: 5px; border-bottom: 1px dotted #ccc; }
        .back-btn { display: block; padding: 12px; background: #333; color: white; text-align: center; text-decoration: none; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header"><h1>🚩 महाराष्ट्र स्तर - संघटना</h1></div>

<div id="dashboard-content"></div>

<a href="index.html" class="back-btn">⬅️ मुख्य डॅशबोर्डवर जा</a>

<script>
    const wings = [
        { name: "श्री शिवमल्हार स्वराज्य प्रतिष्ठान (मुख्य)", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "विद्यार्थी स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "कन्या स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "महिला स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "शेतकरी स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "कामगार स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "आरोग्य स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "परिवहन स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "उद्योजक स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] },
        { name: "क्रीडा स्वराज्य", posts: ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"] }
    ];

    let container = document.getElementById('dashboard-content');
    wings.forEach(wing => {
        let postHtml = wing.posts.map(p => `<div class="post"><b>${p}:</b> [नाव टाका]</div>`).join('');
        container.innerHTML += `
            <div class="accordion">
                <div class="accordion-header" onclick="toggle(this)">${wing.name} <span>▼</span></div>
                <div class="accordion-content">${postHtml}</div>
            </div>
        `;
    });

    function toggle(el) {
        let content = el.nextElementSibling;
        content.style.display = content.style.display === "block" ? "none" : "block";
    }
</script>

</body>
</html>
