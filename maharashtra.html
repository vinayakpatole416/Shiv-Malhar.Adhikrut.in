<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>महाराष्ट्र राज्य - शिवमल्हार स्वराज्य</title>
    <style>
        .container { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; justify-content: center; }
        .card { width: 300px; border: 2px solid #ff9900; padding: 20px; border-radius: 10px; background: #fff8e1; }
        h2 { color: #b71c1c; text-align: center; }
        .pad-list { list-style: none; padding: 0; }
        .pad-list li { padding: 8px; border-bottom: 1px solid #ccc; font-weight: bold; }
    </style>
</head>
<body>

    <h2>महाराष्ट्र राज्य - मुख्य कार्यकारिणी</h2>
    <div class="container">
        <!-- मुख्य प्रतिष्ठान कार्ड -->
        <div class="card">
            <h3>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h3>
            <ul class="pad-list">
                <li>अध्यक्ष</li>
                <li>उपाध्यक्ष</li>
                <li>सचिव</li>
                <li>उपसचिव</li>
                <li>शाखाप्रमुख</li>
                <li>शाखाउपप्रमुख</li>
                <li>कार्याध्यक्ष</li>
                <li>कार्याउपाध्यक्ष</li>
                <li>सभासद</li>
                <li>उपसभासद</li>
            </ul>
        </div>
        <!-- तुम्ही इथे इतर प्रतिष्ठानची कार्डे वाढवू शकता -->
    </div>
    
    <div style="text-align: center; margin-top: 20px;">
        <a href="index.html" class="btn">🏠 मुख्य डॅशबोर्डवर परत जा</a>
    </div>

</body>
</html>
