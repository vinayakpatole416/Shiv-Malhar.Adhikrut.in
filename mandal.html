<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सार्वजनिक मंडळ नोंदणी</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-100 p-4">

<div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl">
    <h2 class="text-xl font-bold text-center text-purple-800 mb-6">श्री शिवमल्हार स्वराज्य प्रतिष्ठान<br>सार्वजनिक मित्र मंडळ नोंदणी</h2>

    <form id="mandalForm" class="space-y-4">
        <select class="w-full p-3 border-2 border-purple-500 rounded-xl font-bold bg-purple-50">
            <option>हिंदुस्थान (Maharashtra)</option>
        </select>
        
        <select class="w-full p-3 border-2 border-purple-500 rounded-xl font-bold bg-purple-50">
            <option>जिल्हा (Zilla) निवडा</option>
            <option>पुणे</option><option>मुंबई</option><option>नागपूर</option><option>छत्रपती संभाजीनगर</option>
        </select>

        <select class="w-full p-3 border-2 border-purple-500 rounded-xl font-bold bg-purple-50">
            <option>तालुका (Taluka) निवडा</option>
            <option>हवेली</option><option>पुरंदर</option><option>बारामती</option>
        </select>

        <input type="text" id="gavName" placeholder="गावचे नाव (Village/City)" class="w-full p-3 border-2 border-purple-500 rounded-xl font-bold">

        <div class="mb-4">
            <label class="block font-bold text-purple-900 mb-2">पदाधिकारी निवडा:</label>
            <div class="grid grid-cols-2 gap-2">
                <button type="button" class="bg-gray-100 p-2 rounded border hover:bg-purple-100 font-bold">अध्यक्ष</button>
                <button type="button" class="bg-gray-100 p-2 rounded border hover:bg-purple-100 font-bold">उपाध्यक्ष</button>
                <button type="button" class="bg-gray-100 p-2 rounded border hover:bg-purple-100 font-bold">सचिव</button>
                <button type="button" class="bg-gray-100 p-2 rounded border hover:bg-purple-100 font-bold">उपसचिव</button>
            </div>
        </div>

        <button type="button" onclick="generateCard()" class="w-full bg-purple-800 text-white p-4 rounded-xl font-bold text-lg hover:bg-purple-900 transition">
            नोंदणी पूर्ण करा (Register)
        </button>
    </form>

    <div id="smartCard" class="hidden mt-8 p-6 bg-purple-50 border-4 border-purple-800 rounded-2xl text-center">
        <h3 class="text-xl font-bold text-purple-900">श्री शिवमल्हार मित्र मंडळ</h3>
        <p id="displayGav" class="text-lg font-bold mt-2"></p>
        <p class="text-sm mt-4">नोंदणी क्रमांक: <span id="regNo"></span></p>
        <p class="text-[10px] mt-2 text-gray-600">हे अधिकृत डिजिटल ओळखपत्र आहे.</p>
        <button onclick="downloadPDF()" class="mt-6 w-full bg-green-600 text-white p-2 rounded-lg font-bold">PDF डाउनलोड करा</button>
    </div>

    <a href="dashboard.html" class="mt-8 block text-center text-purple-700 font-bold underline">⬅ मुख्य डॅशबोर्डवर परत जा</a>
</div>

<script>
    function generateCard() {
        const gav = document.getElementById('gavName').value;
        if(!gav) { alert("कृपया गावचे नाव भरा"); return; }
        
        document.getElementById('displayGav').innerText = "गाव: " + gav;
        document.getElementById('regNo').innerText = Math.floor(100000 + Math.random() * 900000);
        document.getElementById('smartCard').classList.remove('hidden');
    }

    function downloadPDF() {
        const element = document.getElementById('smartCard');
        const opt = {
            margin: 1,
            filename: 'Shiv-Malhar-SmartCard.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
