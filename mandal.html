<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - सार्वजनिक मित्र मंडळ - अधिकृत पोर्टल</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-blue-50 p-6">

<div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-2xl">
    <h2 class="text-2xl font-bold text-blue-900 mb-4 text-center">मंडळ व सभासद नोंदणी</h2>
    
    <form id="regForm" class="space-y-3">
        <input type="text" id="mandalName" placeholder="श्री शिवमल्हार स्वराज्य प्रतिष्ठान - सार्वजनिक मित्र मंडळ" class="w-full border p-3 rounded-lg" required>
        <input type="text" id="memName" placeholder="सभासदाचे नाव" class="w-full border p-3 rounded-lg" required>
        <input type="text" id="post" placeholder="पद (उदा. सदस्य)" class="w-full border p-3 rounded-lg">
        <input type="text" id="district" placeholder="जिल्हा" class="w-full border p-3 rounded-lg" required>
        <input type="number" id="mobile" placeholder="मोबाईल नंबर" class="w-full border p-3 rounded-lg" required>
        
        <button type="button" onclick="processData()" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold">डेटा सेव्ह करा आणि कार्ड मिळवा</button>
    </form>
</div>

<div id="idCard" class="hidden mt-6 bg-gradient-to-br from-blue-900 to-blue-700 text-white p-6 rounded-2xl w-80 mx-auto">
    <h3 class="text-xl font-bold">श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h3>
    <p id="cardName" class="text-lg mt-2 font-semibold"></p>
    <p id="cardPost" class="text-sm opacity-80"></p>
    <div class="mt-4 p-2 bg-white text-black inline-block rounded">
        <p class="text-xs font-bold">युनिक आयडी: <span id="uID">SM-2026-001</span></p>
    </div>
</div>

<script>
async function processData() {
    const data = {
        mandal: document.getElementById('श्री शिवमल्हार स्वराज्य प्रतिष्ठान - सार्वजनिक मित्र मंडळ').value,
        name: document.getElementById('memName').value,
        post: document.getElementById('post').value,
        dist: document.getElementById('district').value,
        mob: document.getElementById('mobile').value
    };

    // १. डेटा गुगल शीटमध्ये पाठवण्यासाठी (तुमची URL इथे टाका)
    const SCRIPT_URL = "https://drive.google.com/drive/folders/1rW10N4fDB18Wv6sLGusUIk1zHt9xze1gWe3RIJjdfJawvJe5MoVJRj3KztF3qYH20UZ6NXQ8";
    await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });

    // २. कार्डवर माहिती भरून ते दाखवणे
    document.getElementById('cardName').innerText = data.name;
    document.getElementById('cardPost').innerText = data.post + " | " + data.mandal;
    document.getElementById('idCard').classList.remove('hidden');

    // ३. कार्ड डाऊनलोड करणे
    html2canvas(document.getElementById('idCard')).then(canvas => {
        let link = document.createElement('a');
        link.download = data.name + '_SmartCard.png';
        link.href = canvas.toDataURL();
        link.click();
    });
    alert("नोंदणी पूर्ण झाली आणि स्मार्ट कार्ड डाऊनलोड होत आहे!");
}
</script>
</body>
</html>
