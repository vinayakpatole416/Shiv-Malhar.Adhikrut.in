<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सिद्धिविनायक सेवा प्रतिष्ठान - प्रोफाइल</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-purple-800 mb-6">स्वयं-प्रोफाइल (Self Profile)</h2>
        
        <div class="flex justify-center mb-6">
            <div class="w-32 h-32 bg-purple-200 rounded-full flex items-center justify-center border-4 border-purple-500 overflow-hidden">
                <span class="text-purple-600 font-bold">फोटो</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-gray-50 p-4 rounded-xl border">
                <p class="text-xs text-gray-500">पूर्ण नाव (Full Name)</p>
                <p class="font-bold text-lg">आपले पूर्ण नाव</p>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-xl border">
                <p class="text-xs text-gray-500">पद (Designation)</p>
                <p class="font-bold text-lg">अध्यक्ष / सदस्य</p>
            </div>

            <div class="bg-gray-50 p-4 rounded-xl border">
                <p class="text-xs text-gray-500">संपर्क (Contact)</p>
                <p class="font-bold text-lg">+९१ ९८७६५ ४३२१०</p>
            </div>
        </div>

        <div class="mt-8 flex gap-4">
            <button class="flex-1 bg-purple-600 text-white py-3 rounded-xl font-bold hover:bg-purple-700">Edit Profile</button>
            <a href="dashboard.html" class="flex-1 text-center py-3 rounded-xl font-bold border border-purple-600 text-purple-600 hover:bg-purple-50">Back</a>
        </div>
    </div>

</body>
</html>
