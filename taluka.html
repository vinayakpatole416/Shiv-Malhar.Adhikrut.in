    <style>

        .wing-title { font-weight: bold; color: white; background: #8e44ad; padding: 10px; margin-top: 20px; border-radius: 5px; }
        .post { margin: 4px 0; padding: 8px; border-bottom: 1px dotted #ccc; display: flex; justify-content: space-between; font-size: 15px; }
        .post span:first-child { font-weight: bold; color: #2c3e50; }

        "पुणे": ['पुणे शहर', 'हवेली', 'खेड', 'जुन्नर', 'आंबेगाव', 'मावळ', 'मुळशी', 'भोर', 'वेल्हा', 'पुरंदर', 'बारामती', 'इंदापूर', 'दौंड', 'शिरूर'],

        "श्री शिवमल्हार विध्यार्थी स्वराज्य प्रतिष्ठान",

    // १० पदांची यादी
    const posts = ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"];

    const distSelect = document.getElementById('districtSelect');
    Object.keys(data).forEach(dist => distSelect.innerHTML += `<option value="${dist}">${dist}</option>`);

    function showTalukas() {
        let talukaSelect = document.getElementById('talukaSelect');
        talukaSelect.innerHTML = '<option value="">-- तालुका निवडा --</option>';
        let selectedDistrict = distSelect.value;
        
        if(selectedDistrict && data[selectedDistrict]) {
            data[selectedDistrict].forEach(t => talukaSelect.innerHTML += `<option value="${t}">${t}</option>`);
        }
        document.getElementById('output').innerHTML = ''; // Clear previous output
    }

    function showData() {
        let selectedTaluka = document.getElementById('talukaSelect').value;
        let out = document.getElementById('output');
        
        if(!selectedTaluka) {
            out.innerHTML = '';
            return;
        }

        let finalHtml = `<h2 class="taluka-title">📍 ${selectedTaluka} तालुका - पदाधिकारी</h2>`;
        
        wings.forEach(w => {
            finalHtml += `<div class="wing-title">${w}</div>`;
            posts.forEach(p => finalHtml += `<div class="post"><span>${p}</span> <span>[नाव प्रविष्ट करा]</span></div>`);
        });
        
        out.innerHTML = finalHtml;
    }
</script>

</html>
