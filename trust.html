<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विश्वस्त संस्था - पदाधिकारी</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-xl">
        <h2 class="text-2xl font-bold text-center text-purple-800 mb-6">पदाधिकारी (Trust Officials)</h2>
        
        <div class="grid grid-cols-1 gap-4">
            <a href="#" class="bg-white border-2 border-purple-500 p-4 rounded-xl text-center hover:bg-purple-50 transition">
                <span class="block font-bold text-lg">संस्थापक</span>
                <span class="block text-xs text-amber-700 italic">संस्थापकः (Founder)</span>
            </a>

            <a href="#" class="bg-white border-2 border-purple-500 p-4 rounded-xl text-center hover:bg-purple-50 transition">
                <span class="block font-bold text-lg">अध्यक्ष</span>
                <span class="block text-xs text-amber-700 italic">अध्यक्षः (President/Chairman)</span>
            </a>

            <a href="#" class="bg-white border-2 border-purple-500 p-4 rounded-xl text-center hover:bg-purple-50 transition">
                <span class="block font-bold text-lg">उपाध्यक्ष</span>
                <span class="block text-xs text-amber-700 italic">उपाध्यक्षः (Vice President)</span>
            </a>

            <a href="#" class="bg-white border-2 border-purple-500 p-4 rounded-xl text-center hover:bg-purple-50 transition">
                <span class="block font-bold text-lg">सचिव</span>
                <span class="block text-xs text-amber-700 italic">सचिवः (Secretary)</span>
            </a>

            <a href="#" class="bg-white border-2 border-purple-500 p-4 rounded-xl text-center hover:bg-purple-50 transition">
                <span class="block font-bold text-lg">कोषाध्यक्ष</span>
                <span class="block text-xs text-amber-700 italic">कोषाध्यक्षः (Treasurer)</span>
            </a>

            <a href="dashboard.html" class="mt-4 block text-center text-purple-700 font-bold underline">
                मुख्य डॅशबोर्डवर परत जा (Back)
            </a>
        </div>
    </div>

</body>
</html>
