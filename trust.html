<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री शिवमल्हार स्वराज्य प्रतिष्ठान - ट्रस्ट</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile Frame Container */
        .mobile-container {
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Header */
        .app-header {
            background: linear-gradient(135deg, #ff7e00, #ff5100);
            color: white;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 3px solid #cca100;
        }

        .app-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: white;
            padding: 2px;
        }

        .app-header h2 {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.3;
        }

        /* Sub-Header Title Card */
        .sub-title-card {
            background-color: #2b2b2b;
            color: #ff9900;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #ff7e00;
        }

        /* Section Heading */
        .section-heading {
            font-size: 13px;
            color: #555;
            text-align: center;
            margin: 10px 0 5px 0;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Content Area */
        .content-area {
            padding: 10px 15px;
            flex-grow: 1;
        }

        /* Admin & Nav Buttons Styling (Exact match to design) */
        .action-btn {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
            transition: 0.2s ease;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        /* Button Colors Alternating (Green & Saffron) */
        .bg-green {
            background-color: #2d8a4e;
        }

        .bg-orange {
            background-color: #e67e22;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
        }

        .btn-left i {
            font-size: 18px;
        }

        .btn-right-badge {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Bottom Grid for 4 Navigation Buttons */
        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 5px;
        }

        .nav-box-btn {
            padding: 14px 10px;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 13px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 3px 5px rgba(0,0,0,0.15);
        }

        .nav-box-btn i {
            font-size: 20px;
        }

        /* Footer small text */
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: #888;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="mobile-container">

    <div class="app-header">
        <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/45'">
        <div>
            <h2>श्री शिवमल्हार स्वराज्य प्रतिष्ठान</h2>
            <span style="font-size: 11px; color: #ffe600;">शिव-मल्हार अधिकृत ॲप</span>
        </div>
    </div>

    <div class="sub-title-card">
        श्री शिवमल्हार स्वराज्य प्रतिष्ठान - ट्रस्ट | महाराष्ट्र राज्य
    </div>

    <div class="content-area">
        <div class="section-heading">प्रशासकीय रचना (महाराष्ट्र राज्य)</div>

        <button class="action-btn bg-green" onclick="location.href='district.html'">
            <div class="btn-left">
                <i class="fas fa-map-marker-alt"></i>
                <span>1.1. जिल्हा (District)</span>
            </div>
            <span class="btn-right-badge">36</span>
        </button>

        <button class="action-btn bg-orange" onclick="location.href='taluka.html'">
            <div class="btn-left">
                <i class="fas fa-map"></i>
                <span>1.2. तालुका (Taluka)</span>
            </div>
            <span class="btn-right-badge">358</span>
        </button>

        <button class="action-btn bg-green" onclick="location.href='mahanagarpalika.html'">
            <div class="btn-left">
                <i class="fas fa-city"></i>
                <span>1.3. महानगरपालिका</span>
            </div>
            <span class="btn-right-badge">29</span>
        </button>

        <button class="action-btn bg-orange" onclick="location.href='nagarparishad.html'">
            <div class="btn-left">
                <i class="fas fa-building"></i>
                <span>1.4. नगरपरिषद</span>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
        </button>

        <button class="action-btn bg-green" onclick="location.href='nagarpanchayat.html'">
            <div class="btn-left">
                <i class="fas fa-landmark"></i>
                <span>1.5. नगरपालिका</span>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
        </button>

        <button class="action-btn bg-orange" onclick="location.href='grampanchayat.html'">
            <div class="btn-left">
                <i class="fas fa-home"></i>
                <span>1.6. ग्रामपंचायत</span>
            </div>
            <i class="fas fa-chevron-right" style="font-size: 12px;"></i>
        </button>

        <div class="section-heading" style="margin-top: 15px;">ट्रस्ट अंतर्गत विभाग</div>

        <div class="nav-grid">
            <button class="nav-box-btn bg-orange" onclick="location.href='draft.html'">
                <i class="fas fa-file-contract"></i>
                <span>2. कायदा मसुदा</span>
            </button>
            <button class="nav-box-btn bg-green" onclick="location.href='officials.html'">
                <i class="fas fa-users"></i>
                <span>3. पदाधिकारी</span>
            </button>
            <button class="nav-box-btn bg-green" onclick="location.href='jurisdiction.html'">
                <i class="fas fa-map-marked-alt"></i>
                <span>4. कार्यक्षेत्र</span>
            </button>
            <button class="nav-box-btn bg-orange" onclick="location.href='info.html'">
                <i class="fas fa-info-circle"></i>
                <span>5. माहिती</span>
            </button>
        </div>
    </div>

    <div class="footer-note">
        © 2026 श्री शिवमल्हार स्वराज्य प्रतिष्ठान | All Rights Reserved
    </div>

</div>

</body>
</html>
