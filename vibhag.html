<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>विभागीय स्तर - श्री शिवमल्हार स्वराज्य प्रतिष्ठान</title>
    <style>
        body { font-family: sans-serif; background-color: #fdf5e6; padding: 15px; }
        .header { background: #2c3e50; color: white; padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        .accordion { background: white; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; overflow: hidden; }
        .accordion-header { padding: 15px; background: #ecf0f1; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; border-bottom: 1px solid #eee; }
        .accordion-content { padding: 15px; display: none; font-size: 0.95rem; background: #fff; }
        .sub-wing { margin-top: 15px; padding-left: 10px; border-left: 3px solid #3498db; }
        .sub-wing-name { font-weight: bold; color: #2c3e50; margin-bottom: 5px; text-decoration: underline; }
        .post { margin: 4px 0; padding: 5px; border-bottom: 1px dotted #ccc; display: flex; justify-content: space-between; }
        .back-btn { display: block; padding: 15px; background: #333; color: white; text-align: center; text-decoration: none; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header"><h1>🏢 विभागीय स्तर - संघटना</h1></div>

<div id="vibhag-content"></div>

<a href="index.html" class="back-btn">🏠 मुख्य मेनू | Home</a>

<script>
    const wingsData = ["अध्यक्ष", "उपाध्यक्ष", "सचिव", "उपसचिव", "शाखाप्रमुख", "शाखाउपप्रमुख", "कार्याध्यक्ष", "कार्याउपाध्यक्ष", "सभासद", "उपसभासद"];
    
    const regions = ["कोकण", "पश्चिम महाराष्ट्र", "मराठवाडा", "विरार", "विदर्भ", "खान्देश"];
    
    const subWings = [
        "श्री शिवमल्हार स्वराज्य प्रतिष्ठान - main",
        "श्री शिवमल्हार विद्यार्थी स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार कन्या स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार महिला स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार शेतकरी स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार कामगार स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार आरोग्य स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार परिवहन स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार उद्योजक स्वराज्य प्रतिष्ठान",
        "श्री शिवमल्हार क्रीडा स्वराज्य प्रतिष्ठान"
    ];

    let container = document.getElementById('vibhag-content');

    regions.forEach(region => {
        let subWingsHtml = subWings.map(sub => {
            let postsHtml = wingsData.map(p => `<div class="post"><span>${p}</span> <span>[नाव]</span></div>`).join('');
            return `<div class="sub-wing"><div class="sub-wing-name">${sub}</div>${postsHtml}</div>`;
        }).join('');

        container.innerHTML += `
            <div class="accordion">
                <div class="accordion-header" onclick="this.nextElementSibling.style.display = (this.nextElementSibling.style.display === 'block') ? 'none' : 'block'">
                    ${region} <span>▼</span>
                </div>
                <div class="accordion-content">${subWingsHtml}</div>
            </div>
        `;
    });
</script>

</body>
</html>
